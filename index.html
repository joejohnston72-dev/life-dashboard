<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gym and Calorie App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Google+Sans:400,500,700&display=swap">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0b10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gym and Calorie App">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    .auth-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: var(--gap);
    }
    .auth-overlay.visible { display: flex; }

    .auth-card {
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .auth-icon { font-size: 3rem; margin-bottom: 16px; }
    .auth-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    .auth-sub { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px; line-height: 1.5; }

    .auth-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      margin-bottom: 12px;
      text-align: center;
    }
    .auth-input:focus { border-color: var(--accent); }

    .auth-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .auth-btn:disabled { opacity: 0.6; }

    .auth-sent {
      display: none;
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-top: 8px;
    }
    .auth-sent span { font-size: 2rem; display: block; margin-bottom: 12px; }

    .header__actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-email {
      font-size: 0.75rem;
      color: var(--text-muted);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .signout-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 4px 10px;
      cursor: pointer;
    }

    /* Suggestions */
    .suggestions { padding: 4px var(--gap) 0; }
    .suggestions__head { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .suggestions__title { font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); }
    .suggestions__count { font-size:0.7rem; font-weight:700; color:#000; background:var(--accent); border-radius:10px; padding:1px 8px; }
    .sugg-card {
      display:flex; align-items:flex-start; gap:12px;
      background:var(--surface); border:1px solid var(--border); border-radius:14px;
      padding:13px 14px; margin-bottom:8px;
      border-left:4px solid var(--sev-color, #38bdf8);
      text-decoration:none; color:var(--text);
      -webkit-tap-highlight-color:transparent;
    }
    .sugg-card:active { background:var(--surface2); }
    .sugg-card.warn { --sev-color:#f43f5e; }
    .sugg-card.tip  { --sev-color:#38bdf8; }
    .sugg-card.good { --sev-color:#81c784; }
    .sugg-icon { line-height:0; flex-shrink:0; color:var(--sev-color, #38bdf8); display:flex; align-items:center; padding-top:1px; }
    .sugg-body { flex:1; min-width:0; }
    .sugg-text { font-size:0.85rem; line-height:1.35; }
    .sugg-module { font-size:0.66rem; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-muted); margin-top:3px; }
    .sugg-x {
      flex-shrink:0; align-self:center;
      background:none; border:none; color:var(--text-muted);
      font-size:0.95rem; cursor:pointer; padding:6px 4px; opacity:0.55;
      -webkit-tap-highlight-color:transparent;
    }
    .sugg-x:active { opacity:1; }
    .sugg-card[data-href] { cursor:pointer; }
    .sugg-loading { font-size:0.82rem; color:var(--text-muted); padding:6px 0; }
  </style>
</head>
<body>
  <!-- Auth overlay -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-card">
      <div class="auth-icon"><i data-lucide="layout-dashboard" data-size="46"></i></div>
      <h2 class="auth-title">Gym and Calorie App</h2>
      <p class="auth-sub">Sign in with your email to keep your data synced across all your devices.</p>
      <div id="authForm">
        <input class="auth-input" id="authEmail" type="email" placeholder="your@email.com" autocomplete="email">
        <button class="auth-btn" id="authBtn">Send code</button>
      </div>
      <div id="authCodeForm" style="display:none">
        <p class="auth-sub" style="margin-bottom:16px">Enter the 6-digit code sent to your email.</p>
        <input class="auth-input" id="authCode" type="text" inputmode="numeric" autocomplete="one-time-code"
               maxlength="8" placeholder="12345678" style="letter-spacing:6px;font-size:1.4rem">
        <button class="auth-btn" id="authVerifyBtn">Verify &amp; sign in</button>
        <button class="auth-btn" id="authResendBtn"
                style="background:none;color:var(--text-muted);margin-top:8px">Use a different email</button>
      </div>
    </div>
  </div>

  <header class="header" style="display:flex;align-items:center;justify-content:space-between;">
    <h1 class="header__title">Gym and Calorie App</h1>
    <div class="header__actions">
      <span class="user-email" id="userEmail"></span>
      <button class="signout-btn" id="signoutBtn" style="display:none" data-tip="Sign out" title="Sign out">Sign out</button>
    </div>
  </header>

  <section class="suggestions" id="suggestions" style="display:none">
    <div class="suggestions__head">
      <span class="suggestions__title">Suggestions</span>
      <span class="suggestions__count" id="suggCount"></span>
    </div>
    <div id="suggList"></div>
  </section>

  <main class="grid">
    <a class="tile tile--calories" href="https://joejohnston72-dev.github.io/calorieAI/">
      <span class="tile__icon"><i data-lucide="flame"></i></span>
      <span class="tile__label">Calories</span>
    </a>
    <a class="tile tile--workout" href="workout/">
      <span class="tile__icon"><i data-lucide="dumbbell"></i></span>
      <span class="tile__label">Gym App</span>
    </a>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      let reloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloading) return;
        reloading = true;
        location.reload();
      });
      navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then(reg => {
        reg.update();
        setInterval(() => reg.update(), 60 * 1000); // check for new build every minute
      });
    }
  </script>

  <script type="module">
    import { supabase } from './shared/supabase.js';
    import { generateSuggestions, dismissSuggestion } from './shared/suggestions.js';
    import { icon, renderIcons } from './shared/icons.js';

    // Map the suggestion engine's emoji to Lucide names (falls back to info).
    const SUGG_ICONS = {
      '💪':'dumbbell', '🏋️':'dumbbell', '⚖️':'scale', '🔥':'flame',
      '✅':'circle-check', '📈':'chart-line', '⚡':'zap', '🎯':'target',
    };
    const suggIcon = emoji => icon(SUGG_ICONS[emoji] || 'info', { size: 20 });

    renderIcons();

    const overlay      = document.getElementById('authOverlay');
    const authForm     = document.getElementById('authForm');
    const authCodeForm = document.getElementById('authCodeForm');
    const authEmail    = document.getElementById('authEmail');
    const authCode     = document.getElementById('authCode');
    const authBtn      = document.getElementById('authBtn');
    const authVerifyBtn = document.getElementById('authVerifyBtn');
    const authResendBtn = document.getElementById('authResendBtn');
    const signoutBtn   = document.getElementById('signoutBtn');
    const userEmailEl  = document.getElementById('userEmail');
    let   pendingEmail = '';

    function showDashboard(user) {
      overlay.classList.remove('visible');
      signoutBtn.style.display = '';
      userEmailEl.textContent = user.email ?? '';
      renderSuggestions();
    }

    let suggestionsRendered = false;
    async function renderSuggestions() {
      if (suggestionsRendered) return;
      suggestionsRendered = true;
      const section = document.getElementById('suggestions');
      const list    = document.getElementById('suggList');
      const count   = document.getElementById('suggCount');
      section.style.display = '';
      list.innerHTML = [0,1].map(() => `
        <div class="sugg-card" style="border-left-color:var(--surface2)">
          <span class="skeleton" style="width:22px;height:22px;border-radius:6px;flex-shrink:0"></span>
          <div class="sugg-body" style="flex:1">
            <div class="skeleton sk-line sk-w70"></div>
            <div class="skeleton sk-line sk-w40" style="margin-bottom:0"></div>
          </div>
        </div>`).join('');
      try {
        const items = await generateSuggestions();
        const paint = (arr) => {
          const actionable = arr.filter(i => i.severity !== 'good').length;
          count.textContent = actionable || '✓';
          count.style.background = actionable ? 'var(--accent)' : '#81c784';
          list.innerHTML = arr.map(i => `
            <div class="sugg-card ${i.severity}" data-key="${i.key}" ${i.href ? `data-href="${i.href}"` : ''}>
              <span class="sugg-icon">${suggIcon(i.icon)}</span>
              <div class="sugg-body">
                <div class="sugg-text">${i.text}</div>
                <div class="sugg-module">${i.module}</div>
              </div>
              ${i.key === 'all-clear' ? '' : `<button class="sugg-x" data-dismiss="${i.key}" aria-label="Dismiss" data-tip="Dismiss" title="Dismiss">${icon('x', { size: 16 })}</button>`}
            </div>`).join('');

          list.querySelectorAll('.sugg-card').forEach(card => {
            card.addEventListener('click', e => {
              if (e.target.closest('.sugg-x')) return;
              if (card.dataset.href) window.location.href = card.dataset.href;
            });
          });
          list.querySelectorAll('.sugg-x').forEach(btn => {
            btn.addEventListener('click', async () => {
              await dismissSuggestion(btn.dataset.dismiss);
              const card = btn.closest('.sugg-card');
              card.style.transition = 'opacity .15s';
              card.style.opacity = '0';
              setTimeout(() => {
                const remaining = arr.filter(x => x.key !== btn.dataset.dismiss);
                if (remaining.length === 0) {
                  paint([{ severity:'good', module:'All', icon:'✅',
                    text:"You're all caught up — nothing needs attention.", href:null, key:'all-clear' }]);
                } else {
                  paint(remaining);
                }
              }, 150);
            });
          });
        };
        paint(items);
      } catch (e) {
        list.innerHTML = '<div class="sugg-loading">Could not load suggestions.</div>';
      }
    }

    function showLogin() {
      overlay.classList.add('visible');
      signoutBtn.style.display = 'none';
      userEmailEl.textContent = '';
    }

    // Handle auth state changes (including magic link callback)
    supabase.auth.onAuthStateChange((_event, session) => {
      if (session) showDashboard(session.user);
      else showLogin();
    });

    // Initial check
    const { data: { session } } = await supabase.auth.getSession();
    if (session) showDashboard(session.user);
    else showLogin();

    authBtn.onclick = async () => {
      const email = authEmail.value.trim();
      if (!email) { authEmail.focus(); return; }
      authBtn.disabled = true;
      authBtn.textContent = 'Sending…';
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { shouldCreateUser: true },
      });
      authBtn.disabled = false;
      authBtn.textContent = 'Send code';
      if (error) { alert(error.message); return; }
      pendingEmail = email;
      authForm.style.display     = 'none';
      authCodeForm.style.display = 'block';
      authCode.focus();
    };

    authVerifyBtn.onclick = async () => {
      const token = authCode.value.trim();
      if (token.length < 6) { authCode.focus(); return; } // 6–8 digit codes
      authVerifyBtn.disabled = true;
      authVerifyBtn.textContent = 'Verifying…';
      const { error } = await supabase.auth.verifyOtp({
        email: pendingEmail, token, type: 'email',
      });
      authVerifyBtn.disabled = false;
      authVerifyBtn.textContent = 'Verify & sign in';
      if (error) { alert(error.message); authCode.select(); return; }
      // onAuthStateChange will reveal the dashboard
    };

    authCode.addEventListener('keydown', e => { if (e.key === 'Enter') authVerifyBtn.click(); });

    authResendBtn.onclick = () => {
      authCodeForm.style.display = 'none';
      authForm.style.display     = 'block';
      authCode.value = '';
      authEmail.focus();
    };

    signoutBtn.onclick = () => supabase.auth.signOut();
  </script>
</body>
</html>
