<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Finance</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { padding-bottom: calc(env(safe-area-inset-bottom) + 64px); }

    /* ── Page header ── */
    .page-header {
      display: flex; align-items: center; gap: 12px;
      padding: 20px var(--gap) 12px;
    }
    .back-btn { background:none;border:none;color:var(--text);font-size:1.4rem;cursor:pointer;padding:4px;line-height:1; }
    .page-title { font-size:1.5rem;font-weight:700;flex:1; }
    .header-action { background:none;border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:var(--text-muted);font-size:0.8rem;padding:5px 12px;cursor:pointer; }

    /* ── Bottom tabs ── */
    .tabs {
      position: fixed;
      bottom: env(safe-area-inset-bottom);
      left: 0; right: 0;
      height: 56px;
      background: var(--surface);
      display: flex;
      border-top: 1px solid rgba(255,255,255,0.07);
      z-index: 10;
    }
    .tab {
      flex: 1; background: none; border: none; color: var(--text-muted);
      font-size: 0.7rem; font-weight: 600; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    }
    .tab-icon { font-size: 1.1rem; }
    .tab.active { color: #81c784; }

    /* ── Sections ── */
    .section { padding: 0 var(--gap); display: none; }
    .section.active { display: block; }

    /* ── Cards ── */
    .card {
      background: var(--surface); border-radius: var(--radius);
      padding: 16px; margin-bottom: 12px;
    }
    .card-title {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 12px;
    }

    /* ── Overview ── */
    .period-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .period-label { font-size: 1rem; font-weight: 700; }
    .edit-btn { background:none;border:none;color:var(--text-muted);font-size:0.8rem;cursor:pointer;padding:4px 8px; }

    .income-row {
      display: flex; align-items: baseline; gap: 8px; margin-bottom: 20px;
    }
    .income-label { font-size: 0.8rem; color: var(--text-muted); }
    .income-amount { font-size: 1.8rem; font-weight: 700; color: #81c784; letter-spacing: -1px; }

    .allocation-row { margin-bottom: 10px; }
    .allocation-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .allocation-name { font-size: 0.85rem; font-weight: 600; }
    .allocation-amount { font-size: 0.85rem; font-weight: 700; }
    .bar-track { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

    .spare-row {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 12px; margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.07);
      font-size: 0.85rem;
    }
    .spare-label { color: var(--text-muted); }
    .spare-amount { font-weight: 700; }
    .spare-amount.negative { color: #e94560; }
    .spare-amount.positive { color: #81c784; }

    /* ── Spend ── */
    .week-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .week-nav-btn { background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;padding:6px 12px; }
    .week-label { font-size: 0.95rem; font-weight: 700; }

    .spend-progress {
      margin-bottom: 20px;
    }
    .spend-nums { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.8rem; }
    .spend-spent { font-weight: 700; }
    .spend-budget { color: var(--text-muted); }

    .tx-group-date { font-size: 0.75rem; color: var(--text-muted); padding: 8px 0 4px; font-weight: 600; }
    .tx-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border-radius: 10px;
      padding: 11px 12px; margin-bottom: 6px;
    }
    .tx-icon { font-size: 1rem; width: 28px; text-align: center; }
    .tx-info { flex: 1; min-width: 0; }
    .tx-cat { font-size: 0.85rem; font-weight: 600; }
    .tx-note { font-size: 0.72rem; color: var(--text-muted); }
    .tx-amount { font-size: 0.9rem; font-weight: 700; color: #e94560; }
    .tx-del { background:none;border:none;color:var(--text-muted);font-size:0.85rem;cursor:pointer;padding:4px;opacity:0.5; }

    .empty-state { text-align:center;color:var(--text-muted);padding:40px 0;font-size:0.9rem;line-height:1.6; }

    /* ── Bills ── */
    .bill-group-title {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted);
      padding: 14px 0 6px;
    }
    .bill-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 6px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .bill-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
    }
    .bill-row.paid .bill-check { background: #81c784; border-color: #81c784; }
    .bill-payee { flex: 1; font-size: 0.9rem; font-weight: 600; }
    .bill-amount { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); }
    .bill-row.paid .bill-amount { text-decoration: line-through; opacity: 0.5; }
    .bill-del { background:none;border:none;color:var(--text-muted);font-size:0.85rem;cursor:pointer;padding:4px;opacity:0.5; }

    .bills-total {
      display: flex; justify-content: space-between;
      padding: 14px; background: var(--surface); border-radius: 10px;
      margin-top: 4px; font-size: 0.9rem;
    }
    .bills-total-label { color: var(--text-muted); }
    .bills-total-amount { font-weight: 700; }

    /* ── Net Worth ── */
    .nw-hero {
      text-align: center; padding: 8px 0 20px;
    }
    .nw-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
    .nw-amount { font-size: 2rem; font-weight: 700; letter-spacing: -1px; }

    .nw-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .nw-row:last-child { border-bottom: none; }
    .nw-name { flex: 1; font-size: 0.9rem; }
    .nw-bal { font-size: 0.9rem; font-weight: 700; }
    .nw-bal.debt { color: #e94560; }
    .nw-edit { background:none;border:none;color:var(--text-muted);font-size:0.8rem;cursor:pointer;padding:4px 8px; }

    .account-group-title {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted); padding: 14px 0 6px;
    }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: calc(env(safe-area-inset-bottom) + 68px); right: 20px;
      width: 52px; height: 52px; border-radius: 50%;
      background: #81c784; border: none; color: #000;
      font-size: 1.5rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 16px rgba(129,199,132,0.35);
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .fab.hidden { display: none; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 20; align-items: flex-end;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px var(--gap) calc(env(safe-area-inset-bottom) + 24px);
      width: 100%; max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 18px; }

    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 5px; display: block; }
    .form-input {
      width: 100%; background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
      padding: 11px 14px; color: var(--text); font-size: 1rem; outline: none;
    }
    .form-input:focus { border-color: #81c784; }
    select.form-input { appearance: none; }

    .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    .btn { flex:1;padding:12px;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;border:none; }
    .btn-primary { background: #81c784; color: #000; }
    .btn-ghost { background: var(--surface2); color: var(--text); }

    /* ── Bank tab ── */
    .bank-connect-card { background:var(--surface); border-radius:var(--radius); padding:20px 16px; text-align:center; margin-bottom:14px; }
    .bank-connect-card .bc-icon { font-size:2.2rem; margin-bottom:10px; }
    .bank-connect-card .bc-title { font-size:1rem; font-weight:700; margin-bottom:6px; }
    .bank-connect-card .bc-sub { font-size:0.82rem; color:var(--text-muted); line-height:1.5; margin-bottom:16px; }
    .bank-btn { width:100%; padding:13px; border:none; border-radius:10px; background:#81c784; color:#000; font-size:0.95rem; font-weight:700; cursor:pointer; }
    .bank-btn.secondary { background:var(--surface2); color:var(--text); }
    .bank-conn-row { display:flex; align-items:center; gap:12px; background:var(--surface); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
    .bank-conn-name { flex:1; font-size:0.9rem; font-weight:600; }
    .bank-conn-status { font-size:0.7rem; padding:2px 8px; border-radius:6px; background:var(--surface2); color:var(--text-muted); }
    .bank-conn-status.linked { background:rgba(129,199,132,0.15); color:#81c784; }
    .bank-synced { font-size:0.72rem; color:var(--text-muted); text-align:center; margin:10px 0; }
    .inst-item { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer; }
    .inst-item:active { opacity:.6; }
    .inst-logo { width:32px; height:32px; border-radius:8px; object-fit:contain; background:#fff; flex-shrink:0; }
    .inst-name { font-size:0.9rem; font-weight:600; }
    .inst-search { width:100%; background:var(--surface2); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:11px 14px; color:var(--text); font-size:1rem; outline:none; margin-bottom:12px; }
    .inst-list { max-height:55vh; overflow-y:auto; }
  </style>
</head>
<body>
  <div class="page-header">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1 class="page-title">Finance</h1>
    <button class="header-action" id="periodBtn">⚙ Period</button>
  </div>

  <!-- Overview -->
  <div class="section active" id="secOverview">
    <div class="card" id="overviewCard"></div>
    <div class="card" id="extrasCard"></div>
  </div>

  <!-- Spend -->
  <div class="section" id="secSpend">
    <div class="week-nav">
      <button class="week-nav-btn" id="weekPrev">‹</button>
      <span class="week-label" id="weekLabel"></span>
      <button class="week-nav-btn" id="weekNext">›</button>
    </div>
    <div class="spend-progress">
      <div class="spend-nums">
        <span class="spend-spent" id="spendSpent"></span>
        <span class="spend-budget" id="spendBudgetLabel"></span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="spendBar" style="background:#81c784"></div></div>
    </div>
    <div id="txList"></div>
  </div>

  <!-- Bills -->
  <div class="section" id="secBills">
    <div id="billsList"></div>
  </div>

  <!-- Net Worth -->
  <div class="section" id="secWorth">
    <div class="card">
      <div class="nw-hero">
        <div class="nw-label">Net Worth</div>
        <div class="nw-amount" id="nwAmount">£0</div>
      </div>
      <div style="display:flex;gap:12px;margin-bottom:4px">
        <div style="flex:1;background:var(--surface2);border-radius:10px;padding:10px 12px">
          <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:4px">Assets</div>
          <div style="font-weight:700;color:#81c784" id="nwAssets">£0</div>
        </div>
        <div style="flex:1;background:var(--surface2);border-radius:10px;padding:10px 12px">
          <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:4px">Debts</div>
          <div style="font-weight:700;color:#e94560" id="nwDebts">£0</div>
        </div>
      </div>
    </div>
    <div id="accountsList"></div>
  </div>

  <!-- Bank -->
  <div class="section" id="secBank">
    <div id="bankBody"></div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab">+</button>

  <!-- Bottom tabs -->
  <nav class="tabs">
    <button class="tab active" data-tab="Overview"><span class="tab-icon">📊</span>Overview</button>
    <button class="tab" data-tab="Spend"><span class="tab-icon">💳</span>Spend</button>
    <button class="tab" data-tab="Bills"><span class="tab-icon">📋</span>Bills</button>
    <button class="tab" data-tab="Worth"><span class="tab-icon">📈</span>Worth</button>
    <button class="tab" data-tab="Bank"><span class="tab-icon">🏦</span>Bank</button>
  </nav>

  <!-- Period modal -->
  <div class="modal-backdrop" id="periodModal">
    <div class="modal">
      <p class="modal-title">Budget Period</p>
      <div class="form-group">
        <label class="form-label">Label (e.g. "June Paycheck 1")</label>
        <input class="form-input" id="periodLabel" placeholder="June Paycheck 1">
      </div>
      <div class="form-group">
        <label class="form-label">Net income (£)</label>
        <input class="form-input" id="periodIncome" type="number" min="0" step="0.01" placeholder="0.00">
      </div>
      <div class="form-group">
        <label class="form-label">Spend account budget (£)</label>
        <input class="form-input" id="periodSpend" type="number" min="0" step="0.01" placeholder="800.00">
      </div>
      <div class="form-group">
        <label class="form-label">Number of weeks in period</label>
        <input class="form-input" id="periodWeeks" type="number" min="1" max="6" placeholder="4">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="periodCancel">Cancel</button>
        <button class="btn btn-primary" id="periodSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Add transaction modal -->
  <div class="modal-backdrop" id="txModal">
    <div class="modal">
      <p class="modal-title">Add Transaction</p>
      <div class="form-group">
        <label class="form-label">Amount (£)</label>
        <input class="form-input" id="txAmount" type="number" min="0" step="0.01" placeholder="0.00">
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-input" id="txCategory">
          <option>Food</option><option>Transport</option><option>Drinks / Eating out</option>
          <option>Shopping</option><option>Health</option><option>Entertainment</option>
          <option>Personal care</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Note (optional)</label>
        <input class="form-input" id="txNote" placeholder="e.g. Tesco" maxlength="60">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="txCancel">Cancel</button>
        <button class="btn btn-primary" id="txSave">Add</button>
      </div>
    </div>
  </div>

  <!-- Add bill modal -->
  <div class="modal-backdrop" id="billModal">
    <div class="modal">
      <p class="modal-title">Add Bill</p>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-input" id="billCategory">
          <option>Debt Repayment</option><option>Savings</option>
          <option>Investment</option><option>Fixed Bill</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Payee / Name</label>
        <input class="form-input" id="billPayee" placeholder="e.g. Rent">
      </div>
      <div class="form-group">
        <label class="form-label">Amount (£)</label>
        <input class="form-input" id="billAmount" type="number" min="0" step="0.01" placeholder="0.00">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="billCancel">Cancel</button>
        <button class="btn btn-primary" id="billSave">Add</button>
      </div>
    </div>
  </div>

  <!-- Edit account modal -->
  <div class="modal-backdrop" id="accountModal">
    <div class="modal">
      <p class="modal-title" id="accountModalTitle">Edit Balance</p>
      <div class="form-group">
        <label class="form-label">Balance (£)</label>
        <input class="form-input" id="accountBalance" type="number" step="0.01" placeholder="0.00">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="accountCancel">Cancel</button>
        <button class="btn btn-primary" id="accountSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Add account modal -->
  <div class="modal-backdrop" id="addAccountModal">
    <div class="modal">
      <p class="modal-title">Add Account</p>
      <div class="form-group">
        <label class="form-label">Name</label>
        <input class="form-input" id="newAccountName" placeholder="e.g. Monzo">
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <select class="form-input" id="newAccountType">
          <option value="savings">Savings</option>
          <option value="investment">Investment</option>
          <option value="current">Current account</option>
          <option value="debt">Debt</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Balance (£)</label>
        <input class="form-input" id="newAccountBalance" type="number" step="0.01" placeholder="0.00">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="addAccountCancel">Cancel</button>
        <button class="btn btn-primary" id="addAccountSave">Add</button>
      </div>
    </div>
  </div>

  <!-- Institution picker modal -->
  <div class="modal-backdrop" id="instModal">
    <div class="modal">
      <p class="modal-title">Choose your bank</p>
      <input class="inst-search" id="instSearch" placeholder="Search banks…" autocomplete="off">
      <div class="inst-list" id="instList"><div style="color:var(--text-muted);font-size:0.85rem;padding:20px;text-align:center">Loading banks…</div></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="instCancel">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
