<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Workout</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    :root { --blue: #4fc3f7; --green: #34d399; --red: #e94560; --amber: #fbbf24; }
    body { padding-bottom: calc(env(safe-area-inset-bottom) + 60px); overscroll-behavior: none; }

    /* ── Shared layout ── */
    .page-header {
      display: flex; align-items: center; gap: 10px;
      padding: 18px var(--gap) 10px; position: sticky; top: 0;
      background: var(--bg); z-index: 5;
    }
    .back-btn { background:none;border:none;color:var(--text);font-size:1.4rem;cursor:pointer;padding:4px;line-height:1; }
    .page-title { font-size:1.4rem;font-weight:700;flex:1; }
    .header-btn {
      background: none; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
      color: var(--text-muted); font-size: 0.78rem; padding: 5px 12px; cursor: pointer;
    }
    .header-btn.primary { background: var(--blue); border-color: var(--blue); color: #000; font-weight: 700; }
    .header-btn.danger  { background: var(--red);  border-color: var(--red);  color: #fff; font-weight: 700; }

    .tabs {
      position: fixed; bottom: env(safe-area-inset-bottom); left:0; right:0;
      height: 56px; background: var(--surface); display: flex;
      border-top: 1px solid rgba(255,255,255,0.07); z-index: 10;
    }
    .tab {
      flex:1; background:none; border:none; color:var(--text-muted);
      font-size:0.68rem; font-weight:600; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    }
    .tab .ti { font-size:1.1rem; }
    .tab.active { color: var(--blue); }

    .section { display:none; padding: 0 var(--gap); }
    .section.active { display:block; }

    /* ── Dashboard ── */
    .start-btn {
      width:100%; padding:18px; border-radius: var(--radius);
      background: var(--blue); border:none; color:#000;
      font-size:1.1rem; font-weight:800; cursor:pointer; margin-bottom:20px;
      display:flex; align-items:center; justify-content:center; gap:10px;
      -webkit-tap-highlight-color: transparent;
    }
    .section-heading {
      font-size:0.72rem; font-weight:700; text-transform:uppercase;
      letter-spacing:0.06em; color:var(--text-muted); margin-bottom:10px;
    }

    .workout-card {
      background: var(--surface); border-radius: var(--radius);
      border-left: 4px solid var(--blue); padding:14px;
      margin-bottom:10px; cursor:pointer; -webkit-tap-highlight-color:transparent;
    }
    .workout-card:active { background: var(--surface2); }
    .wc-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
    .wc-title { font-size:0.95rem; font-weight:700; }
    .wc-date  { font-size:0.72rem; color:var(--text-muted); }
    .wc-meta  { font-size:0.75rem; color:var(--text-muted); margin-bottom:8px; }
    .wc-exercises { display:flex; flex-wrap:wrap; gap:5px; }
    .wc-ex-tag {
      font-size:0.68rem; background:var(--surface2); border-radius:5px;
      padding:2px 8px; color:var(--text-muted);
    }
    .template-card {
      background: var(--surface); border-radius: 12px; border-left: 4px solid var(--amber);
      padding:12px 14px; margin-bottom:8px; cursor:pointer;
      display:flex; align-items:center; justify-content:space-between;
    }
    .template-card:active { background: var(--surface2); }
    .tc-name { font-size:0.9rem; font-weight:700; }
    .tc-ex   { font-size:0.75rem; color:var(--text-muted); margin-top:2px; }
    .tc-del  { background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.9rem;padding:4px 8px;opacity:.5; }

    .empty-state { text-align:center;color:var(--text-muted);padding:30px 0;font-size:0.88rem;line-height:1.7; }

    /* ── Active workout overlay ── */
    #activeWorkout {
      position:fixed; inset:0; background:var(--bg); z-index:50;
      display:flex; flex-direction:column; overflow:hidden;
      transform: translateY(100%); transition: transform 0.3s ease;
    }
    #activeWorkout.visible { transform: translateY(0); }

    .aw-header {
      display:flex; align-items:center; gap:10px; padding:18px var(--gap) 10px;
      flex-shrink:0; background:var(--bg);
    }
    .aw-timer { font-size:0.9rem; color:var(--text-muted); min-width:48px; font-variant-numeric:tabular-nums; }
    .aw-title-input {
      flex:1; background:none; border:none; color:var(--text);
      font-size:1.1rem; font-weight:700; outline:none;
    }
    .aw-title-input::placeholder { color:var(--text-muted); font-weight:400; }

    .aw-body { flex:1; overflow-y:auto; padding:0 var(--gap) var(--gap); }
    .aw-footer {
      flex-shrink:0; padding:10px var(--gap) calc(env(safe-area-inset-bottom) + 10px);
      background:var(--bg); border-top:1px solid rgba(255,255,255,0.07);
    }
    .add-exercise-btn {
      width:100%; padding:13px; border-radius:12px; border:1px dashed rgba(79,195,247,0.4);
      background:none; color:var(--blue); font-size:0.9rem; font-weight:600; cursor:pointer;
    }

    /* ── Exercise block (in active workout) ── */
    .ex-block { margin-bottom:20px; }
    .ex-block-header {
      display:flex; align-items:center; gap:8px; margin-bottom:10px;
    }
    .ex-cat-dot {
      width:8px; height:8px; border-radius:50%; flex-shrink:0;
    }
    .ex-name { font-size:1rem; font-weight:700; flex:1; }
    .ex-menu-btn {
      background:none; border:none; color:var(--text-muted); cursor:pointer;
      font-size:1.1rem; padding:4px 8px;
    }
    .ex-prev-note { font-size:0.72rem; color:var(--text-muted); margin-bottom:8px; padding-left:16px; }
    .ex-notes-input {
      width:100%; background:var(--surface2); border:none; border-radius:8px;
      padding:8px 10px; color:var(--text-muted); font-size:0.8rem; outline:none; margin-bottom:8px;
    }

    /* ── Sets table ── */
    .sets-table { width:100%; border-collapse:collapse; }
    .sets-table th {
      font-size:0.65rem; color:var(--text-muted); text-align:center;
      padding:0 0 6px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    }
    .sets-table th:first-child { text-align:left; width:28px; }
    .sets-table th:last-child { width:40px; }
    .set-row td { padding:3px 2px; }
    .set-num { font-size:0.78rem; color:var(--text-muted); text-align:center; }
    .set-prev { font-size:0.7rem; color:var(--text-muted); text-align:center; white-space:nowrap; }
    .set-input {
      background:var(--surface); border:1px solid rgba(255,255,255,0.08); border-radius:8px;
      padding:8px 4px; color:var(--text); font-size:0.95rem; width:100%; text-align:center; outline:none;
      -moz-appearance:textfield;
    }
    .set-input::-webkit-outer-spin-button,
    .set-input::-webkit-inner-spin-button { -webkit-appearance:none; }
    .set-input:focus { border-color:var(--blue); }
    .set-row.done .set-input { background:rgba(79,195,247,0.1); border-color:rgba(79,195,247,0.3); }
    .set-check {
      width:34px; height:34px; border-radius:50%; border:2px solid rgba(255,255,255,0.2);
      background:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
      font-size:0.8rem; margin:auto; -webkit-tap-highlight-color:transparent;
      transition:background .15s, border-color .15s;
    }
    .set-row.done .set-check { background:var(--blue); border-color:var(--blue); }
    .set-warmup .set-num::after { content:' W'; color:var(--amber); }
    .add-set-row td { padding-top:6px; }
    .add-set-mini {
      background:none; border:1px dashed rgba(255,255,255,0.12); border-radius:8px;
      color:var(--text-muted); font-size:0.75rem; padding:7px; width:100%;
      cursor:pointer; text-align:center;
    }

    /* ── Rest timer ── */
    #restTimer {
      position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.75);
      display:flex; align-items:flex-end;
      opacity:0; pointer-events:none; transition:opacity .2s;
    }
    #restTimer.visible { opacity:1; pointer-events:all; }
    .rest-sheet {
      width:100%; background:var(--surface); border-radius:var(--radius) var(--radius) 0 0;
      padding:28px var(--gap) calc(env(safe-area-inset-bottom) + 28px);
      text-align:center;
    }
    .rest-label { font-size:0.8rem; color:var(--text-muted); margin-bottom:8px; letter-spacing:.04em; text-transform:uppercase; }
    .rest-count {
      font-size:5rem; font-weight:800; letter-spacing:-3px; color:var(--text);
      font-variant-numeric:tabular-nums; line-height:1; margin-bottom:24px;
    }
    .rest-count.low { color:var(--amber); }
    .rest-count.done { color:var(--green); }
    .rest-btns { display:flex; gap:10px; }
    .rest-btn {
      flex:1; padding:13px; border-radius:12px; border:none; cursor:pointer;
      font-size:0.9rem; font-weight:700;
    }
    .rest-btn-skip { background:var(--surface2); color:var(--text); }
    .rest-btn-add  { background:var(--surface2); color:var(--text-muted); }
    .rest-btn-done { background:var(--blue); color:#000; flex:2; }
    .rest-duration-row { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:20px; }
    .rest-dur-btn { background:none; border:1px solid rgba(255,255,255,0.15); border-radius:8px; color:var(--text-muted); font-size:0.8rem; padding:5px 12px; cursor:pointer; }

    /* ── Exercise picker ── */
    #exercisePicker {
      position:fixed; inset:0; z-index:60; background:var(--bg);
      transform:translateY(100%); transition:transform .25s ease;
      display:flex; flex-direction:column;
    }
    #exercisePicker.visible { transform:translateY(0); }
    .ep-header { display:flex; align-items:center; gap:10px; padding:18px var(--gap) 10px; flex-shrink:0; }
    .ep-search {
      flex:1; background:var(--surface); border:1px solid rgba(255,255,255,0.08); border-radius:10px;
      padding:10px 14px; color:var(--text); font-size:0.95rem; outline:none;
    }
    .ep-search:focus { border-color:var(--blue); }
    .ep-cancel { background:none;border:none;color:var(--blue);font-size:0.9rem;cursor:pointer;padding:4px 0; }
    .ep-filters { display:flex; gap:7px; padding:0 var(--gap) 10px; overflow-x:auto; flex-shrink:0; }
    .ep-filters::-webkit-scrollbar { display:none; }
    .ep-filter {
      background:var(--surface); border:none; border-radius:20px; color:var(--text-muted);
      font-size:0.72rem; font-weight:700; padding:5px 12px; cursor:pointer; white-space:nowrap;
      flex-shrink:0;
    }
    .ep-filter.active { background:var(--blue); color:#000; }
    .ep-list { flex:1; overflow-y:auto; padding:0 var(--gap); }
    .ep-item {
      display:flex; align-items:center; gap:12px; padding:13px 0;
      border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .ep-item:active { opacity:.7; }
    .ep-cat-pill {
      font-size:0.62rem; font-weight:700; padding:2px 7px; border-radius:4px;
      color:#000; flex-shrink:0;
    }
    .ep-ex-name { font-size:0.9rem; font-weight:600; flex:1; }
    .ep-custom-row {
      padding:14px 0; border-top:1px solid rgba(255,255,255,0.07);
    }
    .ep-custom-btn {
      width:100%; padding:12px; border-radius:10px; border:1px dashed rgba(255,255,255,0.15);
      background:none; color:var(--text-muted); font-size:0.85rem; cursor:pointer;
    }

    /* ── Workout summary modal ── */
    #workoutSummary {
      position:fixed; inset:0; z-index:70; background:rgba(0,0,0,0.7);
      display:flex; align-items:flex-end;
      opacity:0; pointer-events:none; transition:opacity .2s;
    }
    #workoutSummary.visible { opacity:1; pointer-events:all; }
    .summary-sheet {
      width:100%; background:var(--surface);
      border-radius:var(--radius) var(--radius) 0 0;
      padding:24px var(--gap) calc(env(safe-area-inset-bottom) + 24px);
    }
    .summary-title { font-size:1.1rem; font-weight:700; margin-bottom:4px; }
    .summary-date  { font-size:0.78rem; color:var(--text-muted); margin-bottom:20px; }
    .summary-stats { display:flex; gap:10px; margin-bottom:20px; }
    .stat-box {
      flex:1; background:var(--surface2); border-radius:10px; padding:12px 10px; text-align:center;
    }
    .stat-val   { font-size:1.2rem; font-weight:700; }
    .stat-label { font-size:0.65rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.04em; margin-top:3px; }
    .summary-ex { font-size:0.82rem; color:var(--text-muted); margin-bottom:20px; line-height:1.8; }
    .summary-btns { display:flex; gap:10px; }
    .summary-btn {
      flex:1; padding:14px; border-radius:12px; border:none; font-size:0.95rem; font-weight:700; cursor:pointer;
    }
    .summary-btn-save    { background:var(--blue); color:#000; flex:2; }
    .summary-btn-discard { background:var(--surface2); color:var(--text-muted); }

    /* ── History ── */
    .month-heading { font-size:0.78rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; padding:14px 0 6px; }
    .import-btn {
      width:100%; padding:13px; border-radius:12px;
      border:1px dashed rgba(255,255,255,0.15); background:none;
      color:var(--text-muted); font-size:0.85rem; cursor:pointer; margin-bottom:16px;
    }
    .import-progress { font-size:0.82rem; color:var(--blue); text-align:center; padding:8px 0; display:none; }

    /* ── History detail overlay ── */
    #historyDetail {
      position:fixed; inset:0; z-index:40; background:var(--bg);
      transform:translateX(100%); transition:transform .25s ease;
      overflow-y:auto;
    }
    #historyDetail.visible { transform:translateX(0); }
    .hd-set-row { display:flex; gap:12px; font-size:0.82rem; padding:4px 0; color:var(--text-muted); }
    .hd-set-num { color:var(--text-muted); min-width:20px; }
    .hd-set-val { color:var(--text); font-weight:600; }

    /* ── Library ── */
    .lib-item {
      display:flex; align-items:center; gap:12px; padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .lib-name { flex:1; font-size:0.9rem; }
    .lib-custom-badge {
      font-size:0.65rem; background:rgba(255,255,255,0.08); border-radius:4px;
      padding:2px 6px; color:var(--text-muted);
    }

    /* ── Generic modal ── */
    .modal-backdrop {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:80; align-items:flex-end;
    }
    .modal-backdrop.open { display:flex; }
    .modal {
      background:var(--surface); border-radius:var(--radius) var(--radius) 0 0;
      padding:24px var(--gap) calc(env(safe-area-inset-bottom) + 24px); width:100%;
    }
    .modal-title { font-size:1rem; font-weight:700; margin-bottom:16px; }
    .form-group  { margin-bottom:13px; }
    .form-label  { font-size:0.75rem; color:var(--text-muted); margin-bottom:5px; display:block; }
    .form-input  {
      width:100%; background:var(--surface2); border:1px solid rgba(255,255,255,0.08);
      border-radius:10px; padding:11px 14px; color:var(--text); font-size:1rem; outline:none;
    }
    .form-input:focus { border-color:var(--blue); }
    select.form-input { appearance:none; }
    .modal-btns { display:flex; gap:10px; margin-top:16px; }
    .btn { flex:1; padding:12px; border-radius:10px; font-size:0.95rem; font-weight:700; cursor:pointer; border:none; }
    .btn-p { background:var(--blue); color:#000; }
    .btn-g { background:var(--surface2); color:var(--text); }
    .btn-d { background:var(--red); color:#fff; }

    /* ── Active workout mini-bar (shown in other tabs) ── */
    #miniBar {
      position:fixed; bottom:calc(env(safe-area-inset-bottom) + 58px); left:8px; right:8px;
      background:var(--blue); border-radius:12px; padding:11px 16px;
      display:none; align-items:center; gap:12px; z-index:9; cursor:pointer;
      box-shadow:0 4px 16px rgba(79,195,247,0.4);
    }
    #miniBar.visible { display:flex; }
    .mini-title { flex:1; font-size:0.9rem; font-weight:700; color:#000; }
    .mini-timer { font-size:0.82rem; color:rgba(0,0,0,0.7); font-variant-numeric:tabular-nums; }

    /* ── Misc ── */
    .divider { height:1px; background:rgba(255,255,255,0.06); margin:12px 0; }
  </style>
</head>
<body>

<!-- ── Main app ── -->
<div id="mainApp">
  <div class="page-header">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1 class="page-title" id="mainTitle">Workout</h1>
  </div>

  <!-- Dashboard -->
  <div class="section active" id="secDashboard">
    <button class="start-btn" id="startEmptyBtn">💪 Start Empty Workout</button>

    <div class="section-heading" id="templatesHeading">Routines</div>
    <div id="templatesList"></div>

    <div class="section-heading" style="margin-top:16px">Recent</div>
    <div id="recentList"></div>
  </div>

  <!-- History -->
  <div class="section" id="secHistory">
    <button class="import-btn" id="importBtn">📥 Import from Hevy (CSV)</button>
    <div class="import-progress" id="importProgress"></div>
    <input type="file" id="csvInput" accept=".csv" style="display:none">
    <div id="historyList"></div>
  </div>

  <!-- Library -->
  <div class="section" id="secLibrary">
    <div style="margin-bottom:12px">
      <input class="form-input" id="libSearch" placeholder="Search exercises…" style="margin-bottom:10px">
    </div>
    <div id="libraryList"></div>
  </div>

  <nav class="tabs">
    <button class="tab active" data-tab="Dashboard"><span class="ti">🏠</span>Home</button>
    <button class="tab" data-tab="History"><span class="ti">📋</span>History</button>
    <button class="tab" data-tab="Library"><span class="ti">📚</span>Library</button>
  </nav>
</div>

<!-- ── Active workout overlay ── -->
<div id="activeWorkout">
  <div class="aw-header">
    <span class="aw-timer" id="awTimer">0:00</span>
    <input class="aw-title-input" id="awTitle" placeholder="Workout name…" maxlength="50">
    <button class="header-btn" id="awFinishBtn">Finish</button>
  </div>
  <div class="aw-body" id="awBody"></div>
  <div class="aw-footer">
    <button class="add-exercise-btn" id="awAddExBtn">+ Add Exercise</button>
  </div>
</div>

<!-- ── Mini bar (workout in progress, different tab) ── -->
<div id="miniBar" onclick="openActiveWorkout()">
  <span class="mini-title" id="miniTitle">Workout in progress</span>
  <span class="mini-timer" id="miniTimer">0:00</span>
</div>

<!-- ── Rest timer ── -->
<div id="restTimer" onclick="handleRestBgClick(event)">
  <div class="rest-sheet">
    <div class="rest-label">Rest</div>
    <div class="rest-count" id="restCount">1:30</div>
    <div class="rest-duration-row">
      <button class="rest-dur-btn" onclick="adjustRest(-15)">−15s</button>
      <span style="font-size:0.75rem;color:var(--text-muted)" id="restTotal">90s</span>
      <button class="rest-dur-btn" onclick="adjustRest(+15)">+15s</button>
    </div>
    <div class="rest-btns">
      <button class="rest-btn rest-btn-skip" onclick="skipRest()">Skip</button>
      <button class="rest-btn rest-btn-done" onclick="skipRest()">Done</button>
    </div>
  </div>
</div>

<!-- ── Exercise picker ── -->
<div id="exercisePicker">
  <div class="ep-header">
    <input class="ep-search" id="epSearch" placeholder="Search exercises…" autocomplete="off">
    <button class="ep-cancel" id="epCancel">Cancel</button>
  </div>
  <div class="ep-filters" id="epFilters"></div>
  <div class="ep-list" id="epList"></div>
</div>

<!-- ── Workout summary ── -->
<div id="workoutSummary" onclick="handleSummaryBgClick(event)">
  <div class="summary-sheet">
    <div class="summary-title" id="summaryTitle"></div>
    <div class="summary-date"  id="summaryDate"></div>
    <div class="summary-stats" id="summaryStats"></div>
    <div class="summary-ex"    id="summaryExercises"></div>
    <div class="summary-btns">
      <button class="summary-btn summary-btn-discard" id="discardBtn">Discard</button>
      <button class="summary-btn summary-btn-save"    id="saveBtn">Save Workout</button>
    </div>
  </div>
</div>

<!-- ── History detail ── -->
<div id="historyDetail">
  <div class="page-header">
    <button class="back-btn" id="hdBack">←</button>
    <h1 class="page-title" id="hdTitle"></h1>
    <button class="header-btn btn-d" id="hdDelete" style="border:none">Delete</button>
  </div>
  <div style="padding:0 var(--gap)" id="hdBody"></div>
</div>

<!-- ── Add custom exercise modal ── -->
<div class="modal-backdrop" id="customExModal">
  <div class="modal">
    <p class="modal-title">Add Custom Exercise</p>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="customExName" placeholder="Exercise name" maxlength="50">
    </div>
    <div class="form-group">
      <label class="form-label">Muscle Group</label>
      <select class="form-input" id="customExCat"></select>
    </div>
    <div class="modal-btns">
      <button class="btn btn-g" id="customExCancel">Cancel</button>
      <button class="btn btn-p" id="customExSave">Add</button>
    </div>
  </div>
</div>

<!-- ── Template name modal ── -->
<div class="modal-backdrop" id="templateNameModal">
  <div class="modal">
    <p class="modal-title">Save as Routine</p>
    <div class="form-group">
      <label class="form-label">Routine name</label>
